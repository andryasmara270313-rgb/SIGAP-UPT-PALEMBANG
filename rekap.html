<!-- START PAGE: MASTER DATA - REKAP GANGGUAN -->
<section class="page" id="rekap">
                <div class="page-actions">
                    <h2>Rekap Gangguan</h2>
                    <button class="primary rekap-action" data-add="rekap"><i data-lucide="plus"></i>Tambah Data</button>
                </div>
                <div class="tabs compact" data-tabs="rekap"><button class="tab active" data-tab="data"><i data-lucide="list-checks"></i>Data</button><button class="tab" data-tab="penyebab"><i data-lucide="list-tree"></i>Penyebab</button><button class="tab" data-tab="pareto"><i data-lucide="list-tree"></i>Pareto</button></div>
                <div class="tab-panel active" data-tab-panel="rekap:data">
                    <div class="table-tools rekap-tools"><input type="search" placeholder="Cari tanggal, segmen, bay, GI, keterangan..."><select><option>Pareto: Semua</option></select><select><option>Penyebab: Semua</option></select><select><option>Semua ULTG</option></select><button class="ghost import-btn" type="button" data-import="rekap"><i data-lucide="upload"></i>Upload Data</button></div>
                    <article class="panel no-pad">
                        <table>
                            <thead><tr><th>TANGGAL</th><th>PARETO</th><th>SEGMEN / BAY</th><th>ULTG</th><th>LINE</th><th>STATUS</th><th>PENYEBAB</th><th>ALAT</th><th>KETERANGAN</th><th>AKSI</th></tr></thead>
                            <tbody id="rekapRows"></tbody>
                        </table>
                    </article>
                </div>
                <div class="tab-panel" data-tab-panel="rekap:penyebab">
                    <article class="panel no-pad">
                        <table>
                            <thead><tr><th>PENYEBAB</th><th>KODE</th><th>WARNA</th><th>KATEGORI INDUK</th><th>URUTAN</th><th>AKSI</th></tr></thead>
                            <tbody id="penyebabRows"></tbody>
                        </table>
                    </article>
                </div>
                <div class="tab-panel" data-tab-panel="rekap:pareto">
                    <article class="panel no-pad">
                        <table>
                            <thead><tr><th>PARETO</th><th>KODE</th><th>WARNA</th><th>KATEGORI INDUK</th><th>URUTAN</th><th>AKSI</th></tr></thead>
                            <tbody id="paretoRows"></tbody>
                        </table>
                        <p class="table-note">5 pareto - sub-pareto ditampilkan menjorok di bawah induknya</p>
                    </article>
                </div>
            </section>
<!-- END PAGE: MASTER DATA - REKAP GANGGUAN -->
