<!-- START PAGE: TEGANGAN INDUKSI -->
<section class="page" id="induksi">
                <div class="page-actions">
                    <h2>Tegangan Induksi</h2>
                    <button class="primary" data-add="induksi"><i data-lucide="plus"></i>Tambah Data</button>
                </div>
                <div class="tabs compact" data-tabs="induksi"><button class="tab active" data-tab="evaluasi"><i data-lucide="list"></i>Evaluasi</button><button class="tab" data-tab="data"><i data-lucide="zap"></i>Data</button></div>
                <div class="tab-panel active" data-tab-panel="induksi:evaluasi">
                    <div class="induksi-list">
                    <article class="eval">
                        <h4>EVALUASI 1</h4>
                        <div class="eval-grid">
                            <label>GARDU INDUK<select class="induksi-gi"><option>- Pilih GI -</option><option>GI 150KV NATAR</option><option>GI 150KV METRO</option><option>GI 150KV PAKUAN RATU</option></select></label>
                            <label>BAY<select class="induksi-bay"><option>Pilih GI terlebih dahulu</option></select></label>
                            <label>TEG/SUDUT 1<select class="induksi-data"><option>Pilih Bay terlebih dahulu</option></select></label>
                            <label>TEG/SUDUT 2<span class="segmented small" data-induksi-mode><button type="button" class="active" data-mode="data">Dari Data</button><button type="button" data-mode="manual">Manual</button></span><input class="induksi-manual" placeholder="Mode manual - isi nilai langsung di tabel evaluasi" disabled></label>
                        </div>
                    </article>
                    <article class="eval">
                        <h4>EVALUASI 2</h4>
                        <div class="eval-grid">
                            <label>GARDU INDUK<select class="induksi-gi"><option>- Pilih GI -</option><option>GI 150KV NATAR</option><option>GI 150KV METRO</option><option>GI 150KV PAKUAN RATU</option></select></label>
                            <label>BAY<select class="induksi-bay"><option>Pilih GI terlebih dahulu</option></select></label>
                            <label>TEG/SUDUT 1<select class="induksi-data"><option>Pilih Bay terlebih dahulu</option></select></label>
                            <label>TEG/SUDUT 2<span class="segmented small" data-induksi-mode><button type="button" class="active" data-mode="data">Dari Data</button><button type="button" data-mode="manual">Manual</button></span><input class="induksi-manual" placeholder="Mode manual - isi nilai langsung di tabel evaluasi" disabled></label>
                        </div>
                    </article>
                    </div>
                </div>
                <div class="tab-panel" data-tab-panel="induksi:data">
                    <div class="table-tools induksi-tools"><input type="search" placeholder="Cari bay, lokasi, tanggal..."><select><option>Semua ULTG</option><option>ULTG PAGELARAN</option><option>ULTG KOTABUMI</option><option>ULTG TEGINENENG</option></select><button class="ghost import-btn" type="button" data-import="induksi"><i data-lucide="upload"></i>Upload Data</button></div>
                    <article class="panel no-pad">
                        <table>
                            <thead><tr><th>TANGGAL</th><th>BAY</th><th>LOKASI</th><th>ULTG</th><th>KV</th><th>VAB / VAC / VBC (KV)</th><th>KETERANGAN</th><th>AKSI</th></tr></thead>
                            <tbody id="induksiRows"></tbody>
                        </table>
                    </article>
                </div>
            </section>
<!-- END PAGE: TEGANGAN INDUKSI -->
