services:
  - type: web
    name: sigerlyzer
    runtime: node
    plan: free
    buildCommand: npm run check
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MAPTILER_KEY
        sync: false
