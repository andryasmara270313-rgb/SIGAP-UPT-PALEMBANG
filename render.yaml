services:
  - type: web
    name: sigap-pln
    runtime: node
    plan: starter
    buildCommand: npm install --no-audit --no-fund --registry=https://registry.npmjs.org/
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      - key: NODE_VERSION
        value: 22.22.0

      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: sigap-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      - key: ADMIN_USERNAME
        value: admin

      - key: ADMIN_PASSWORD
        sync: false

      - key: ADMIN_NAME
        value: Administrator SIGAP

databases:
  - name: sigap-db
    plan: basic-256mb
    databaseName: sigap_pln
    user: sigap_user
