<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halaman Tidak Ditemukan | SIGAP PLN</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #061b4f, #0b59a5);
      color: #ffffff;
    }

    .card {
      width: min(560px, 100%);
      padding: 48px 32px;
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0;
      font-size: 96px;
      line-height: 1;
      color: #ffd400;
    }

    h2 {
      margin: 14px 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 28px;
      line-height: 1.6;
      color: #eaf4ff;
    }

    a {
      display: inline-block;
      padding: 13px 26px;
      border-radius: 10px;
      background: #ffd400;
      color: #061b4f;
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      background: #ffffff;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>404</h1>
    <h2>Halaman Tidak Ditemukan</h2>
    <p>
      Alamat yang Anda buka tidak tersedia atau telah dipindahkan.
    </p>
    <a href="/">Kembali ke SIGAP</a>
  </main>
</body>
</html>
