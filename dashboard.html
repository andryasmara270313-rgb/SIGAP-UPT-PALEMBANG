<!-- START PAGE: DASHBOARD -->
<section class="page active" id="dashboard">
                <h2>Dashboard</h2>
                <div class="summary-grid">
                    <article class="summary-card">
                        <i data-lucide="triangle-alert"></i>
                        <span>Total Gangguan</span>
                        <strong>371</strong>
                    </article>
                    <article class="summary-card">
                        <i data-lucide="calendar-days"></i>
                        <span>Bulan Ini</span>
                        <strong>2</strong>
                    </article>
                </div>

                <article class="panel">
                    <div class="panel-head">
                        <h3><i data-lucide="chart-no-axes-combined"></i>Gangguan Year-on-Year (Akumulatif)</h3>
                        <label class="check"><input type="checkbox" id="toggleValues">Tampilkan nilai</label>
                    </div>
                    <div class="filter-row dashboard-filters">
                        <select id="filterTahun"><option value="all">Tahun: Semua</option><option>2026</option><option>2025</option><option>2024</option><option>2023</option><option>2022</option></select>
                        <select id="filterPareto"><option value="all">Pareto: Semua</option><option>PHT</option><option>INC</option><option>TD</option><option>ABOF</option></select>
                        <select id="filterPenyebab"><option value="all">Penyebab: Semua</option><option>Petir</option><option>Alat</option><option>Ular</option><option>PFL</option><option>Pohon</option></select>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="gangguanChart"></canvas>
                    </div>
                </article>
                <div class="dashboard-detail-grid">
                    <article class="panel">
                        <div class="panel-head"><h3><i data-lucide="bar-chart-3"></i>Tren Gangguan per Bulan</h3><label class="check"><input type="checkbox" id="toggleSubCause">Rinci sub-penyebab</label></div>
                        <div class="chart-wrap compact-chart"><canvas id="monthlyChart"></canvas></div>
                    </article>
                    <article class="panel">
                        <div class="panel-head"><h3><i data-lucide="pie-chart"></i>Komposisi per Pareto</h3></div>
                        <div class="chart-wrap compact-chart"><canvas id="paretoChart"></canvas></div>
                    </article>
                </div>
                <article class="panel no-pad">
                    <div class="panel-title"><h3>Rekap Terfilter</h3><span class="muted" id="dashboardFilterNote">Semua data</span></div>
                    <table>
                        <thead><tr><th>TANGGAL</th><th>PARETO</th><th>SEGMEN / BAY</th><th>ULTG</th><th>STATUS</th><th>PENYEBAB</th></tr></thead>
                        <tbody id="dashboardRows"></tbody>
                    </table>
                </article>
            </section>
<!-- END PAGE: DASHBOARD -->
