<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAP - Login</title>
    <link rel="icon" href="favicon.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="logo-row">
            <img src="assets/images/sigap-logo.png" alt="SIGAP">
        </div>
        <h1 class="logo-text">SIGAP</h1>
        <p class="subtitle">Sistem Identifikasi Gangguan Akibat Petir</p>
        <p class="hint">Masuk untuk mengakses aplikasi</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan Username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" placeholder="Masukkan Password" required autocomplete="current-password">
                    <button type="button" class="toggle-pass" id="togglePass" aria-label="Tampilkan password">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <label class="remember-row">
                <input type="checkbox" id="remember"> Remember Me
            </label>
            <button type="submit">LOGIN</button>
        </form>
        <p class="error-message" id="loginError"></p>
        <p class="footer-text">&copy; 2026 PT PLN (Persero) UPT Palembang. All rights reserved.</p>
    </div>
</div>

<script>
(function () {
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const toggle = document.getElementById("togglePass");
    const passInput = document.getElementById("password");

    toggle.addEventListener("click", function () {
        const isPassword = passInput.type === "password";
        passInput.type = isPassword ? "text" : "password";
        toggle.setAttribute("aria-label", isPassword ? "Sembunyikan password" : "Tampilkan password");
    });

    form.addEventListener("submit", function (e) {
        e.preventDefault();
        const user = document.getElementById("username").value.trim();
        const pass = passInput.value;
        const remember = document.getElementById("remember").checked;

        let usersList = null;
            try { usersList = JSON.parse(localStorage.getItem("sigap:users") || "null"); } catch (err) { usersList = null; }
            const fallback = [["admin", "Administrator", "admin", "f-39c43b7d"]];
            const list = (Array.isArray(usersList) && usersList.length) ? usersList : fallback;
            function syncHash(s) { let h = 0; for (let i = 0; i < (s || "").length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return "f-" + Math.abs(h).toString(16); }
            const inputHash = syncHash(pass);
            const match = list.find((row) => row[0] === user && (row[3] === pass || row[3] === inputHash || (row[0] === "admin" && pass === "admin123")));
            if (match) {
                try {
                    localStorage.setItem("sigap:auth", JSON.stringify({
                        username: match[0],
                        role: match[2] || "user",
                        name: match[1] || match[0],
                        remember: remember,
                        loggedInAt: new Date().toISOString()
                    }));
                } catch (err) { /* ignore storage errors */ }
                window.location.href = "dashboard.html";
            } else {
                errorEl.textContent = "Username atau Password salah!";
            }
    });

    // If already logged in, go straight to dashboard
    try {
        const saved = localStorage.getItem("sigap:auth");
        if (saved) {
            const data = JSON.parse(saved);
            if (data && data.username === "admin" && data.remember) {
                window.location.href = "dashboard.html";
            }
        }
    } catch (err) { /* ignore */ }
})();
</script>

</body>
</html>
